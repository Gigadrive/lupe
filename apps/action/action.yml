name: 'lupe AI code review'
description: 'Platform- and provider-agnostic AI code review. Bring your own model tokens.'
author: 'Gigadrive'
branding:
  icon: 'search'
  color: 'purple'

inputs:
  github-token:
    description: 'Token used to read the PR and post review comments.'
    default: ${{ github.token }}
  provider:
    description: 'Model provider: anthropic | openai | google | bedrock | openai-compatible | gateway. Overrides .lupe.yaml; falls back to anthropic.'
    default: ''
  models:
    description: 'JSON map of task→model id, e.g. {"review":"claude-opus-4-8"}. Overrides .lupe.yaml.'
    default: ''
  profile:
    description: 'Review profile: chill | assertive. Overrides .lupe.yaml; defaults to chill.'
    default: ''
  base-url:
    description: 'Custom base URL (for openai-compatible / gateway).'
    default: ''
  max-files:
    description: 'Maximum number of changed files to review.'
    default: ''
  max-findings:
    description: 'Maximum number of findings to keep.'
    default: ''
  confidence-threshold:
    description: 'Global confidence floor (0..1) for keeping a finding. Overrides .lupe.yaml.'
    default: ''
  suppress-advisory:
    description: 'Drop advisory (style/docs/test/maintainability) findings entirely: true | false.'
    default: ''
  min-severity-to-comment:
    description: 'Only post inline comments for findings at/above this severity (rest stay in the summary): critical | high | medium | low | info.'
    default: ''
  thorough:
    description: 'Use the strongest model and extra passes.'
    default: 'false'
  max-chunk-tokens:
    description: 'Max serialised-diff tokens per review pass (large-PR map-reduce).'
    default: ''
  max-chunks:
    description: 'Hard ceiling on review passes for a large PR. Overflow is reported, not silently dropped.'
    default: ''
  review-concurrency:
    description: 'How many large-PR review passes to run concurrently.'
    default: ''
  max-cost-usd:
    description: 'Hard USD ceiling for a review. Over-budget runs fail before/mid the model calls rather than posting.'
    default: ''
  skip-draft:
    description: 'Skip draft pull requests.'
    default: 'true'
  allow-untrusted-checkout:
    description: 'Opt in to running on pull_request_target. Only set true if the job does NOT check out untrusted PR code; the review runs tool-less regardless.'
    default: 'false'
  fail-on-severity:
    description: 'Fail the job if any finding is at/above this severity: none | critical | high | medium | low'
    default: 'none'

outputs:
  findings:
    description: 'Number of findings posted.'
  cost-usd:
    description: 'Approximate USD cost of the review.'
  skipped:
    description: 'Number of changed files left unreviewed because the chunk ceiling was reached.'

runs:
  using: 'node24'
  main: 'dist/index.js'
