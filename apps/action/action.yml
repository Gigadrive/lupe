name: 'lupe AI code review'
description: 'Platform- and provider-agnostic AI code review. Bring your own model tokens.'
author: 'Gigadrive'
branding:
  icon: 'search'
  color: 'purple'

inputs:
  github-token:
    description: 'Token used to read the PR and post review comments.'
    default: ${{ github.token }}
  provider:
    description: 'Model provider: anthropic | openai | google | bedrock | openai-compatible | gateway'
    default: 'anthropic'
  models:
    description: 'JSON map of task→model id, e.g. {"review":"claude-opus-4-8"}'
    default: ''
  profile:
    description: 'Review profile: chill | assertive'
    default: 'chill'
  base-url:
    description: 'Custom base URL (for openai-compatible / gateway).'
    default: ''
  max-files:
    description: 'Maximum number of changed files to review.'
    default: ''
  max-findings:
    description: 'Maximum number of findings to keep.'
    default: ''
  thorough:
    description: 'Use the strongest model and extra passes.'
    default: 'false'
  max-chunk-tokens:
    description: 'Max serialised-diff tokens per review pass (large-PR map-reduce).'
    default: ''
  max-chunks:
    description: 'Hard ceiling on review passes for a large PR. Overflow is reported, not silently dropped.'
    default: ''
  review-concurrency:
    description: 'How many large-PR review passes to run concurrently.'
    default: ''
  skip-draft:
    description: 'Skip draft pull requests.'
    default: 'true'
  fail-on-severity:
    description: 'Fail the job if any finding is at/above this severity: none | critical | high | medium | low'
    default: 'none'

outputs:
  findings:
    description: 'Number of findings posted.'
  cost-usd:
    description: 'Approximate USD cost of the review.'
  skipped:
    description: 'Number of changed files left unreviewed because the chunk ceiling was reached.'

runs:
  using: 'node24'
  main: 'dist/index.js'
