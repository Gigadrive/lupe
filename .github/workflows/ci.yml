name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  static:
    name: Format · Lint · Knip
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-pnpm
      - name: Format (oxfmt)
        run: pnpm format
      - name: Lint (oxlint)
        run: pnpm lint
      - name: Dependency hygiene (knip)
        run: pnpm knip

  build:
    name: Build · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-pnpm
      - name: Build · typecheck · test · check exports
        run: pnpm turbo run build typecheck test check:exports
      - name: Effect language-service check
        run: pnpm effect:check
