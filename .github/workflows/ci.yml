name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build typecheck test check:exports

  # Fails if the committed Action bundle (apps/action/dist) drifts from source.
  action-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build via turbo so the workspace deps (^build) are built before the ncc bundle.
      - run: pnpm turbo run build --filter=@gigadrive/lupe-action
      - name: Verify dist is up to date
        run: git diff --exit-code -- apps/action/dist || (echo "::error::apps/action/dist is stale — run 'pnpm turbo run build --filter=@gigadrive/lupe-action' and commit." && exit 1)
