# Dogfood: lupe reviews its own pull requests.
# Requires an ANTHROPIC_API_KEY secret (org-level, shared to this repo) — the
# job fails until that secret exists. See apps/action/README.md.
name: lupe

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read # read the repo
  pull-requests: write # post the review + sticky summary

concurrency:
  group: lupe-${{ github.event.pull_request.number }}
  cancel-in-progress: true # cancel superseded runs on a new push

jobs:
  review:
    runs-on: ubuntu-latest # GitHub-hosted: guarantees the node24 action runtime
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5 # default fetch-depth: 1 — the diff comes from the API, not git history
      - uses: Gigadrive/lupe/apps/action@1cfb0b17fe2f7fad327bc3674e3062c8cbbcfca1 # v0.2.1 # pin immutable during the pilot; move to @v0 once trusted
        with:
          provider: anthropic
          profile: chill
          max-cost-usd: '2'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
