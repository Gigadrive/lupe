name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm Trusted Publishing (OIDC) + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm turbo run build
      - name: Create Release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Provenance attestations via OIDC. Requires a public repo + npm Trusted Publishing.
          NPM_CONFIG_PROVENANCE: 'true'

      # The Action is consumed via git ref (gigadrive/lupe/apps/action@vN), so its built ncc
      # bundle must live on the consumed tag — but we keep it OUT of main (apps/action/dist is
      # gitignored). When Changesets bumps @gigadrive/lupe-action, this tags the freshly built
      # bundle: an immutable vX.Y.Z plus a moving vN major alias. Guarded so it only runs once
      # per version (release.yml fires on every push to main).
      - name: Tag built Action bundle on version bump
        run: |
          set -euo pipefail
          V="$(node -p "require('./apps/action/package.json').version")"
          if [ "$V" = "0.0.0" ]; then
            echo "placeholder version 0.0.0 — nothing to release."; exit 0
          fi
          MAJOR="v${V%%.*}"
          if git ls-remote --tags --exit-code origin "refs/tags/v${V}" >/dev/null 2>&1; then
            echo "v${V} already published — skipping."; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f apps/action/dist            # force past .gitignore
          git commit -m "build(action): release v${V}"
          git tag "v${V}" && git tag -f "${MAJOR}"
          git push origin "v${V}" && git push -f origin "${MAJOR}"  # tags only — main never gets this commit
